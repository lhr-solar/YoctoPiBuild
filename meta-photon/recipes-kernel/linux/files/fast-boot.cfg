# Photon fast-boot kernel config fragment
# Strip everything not needed for a kiosk dashboard on CM5

# ── Disable sound subsystem entirely ──
# CONFIG_SOUND is not set
# CONFIG_SND is not set

# ── Disable Bluetooth ──
# CONFIG_BT is not set

# ── Disable security mitigations (kiosk is single-purpose, not multi-tenant) ──
# CONFIG_RETPOLINE is not set
# CONFIG_CPU_SPEC_STORE_BYPASS_DISABLE is not set
# CONFIG_MITIGATIONS is not set
CONFIG_SPECULATION_MITIGATIONS=n

# ── Disable unused filesystems ──
# CONFIG_BTRFS_FS is not set
# CONFIG_XFS_FS is not set
# CONFIG_NTFS_FS is not set
# CONFIG_NTFS3_FS is not set
# CONFIG_NFS_FS is not set
# CONFIG_NFSD is not set
# CONFIG_CIFS is not set
# CONFIG_SQUASHFS is not set
# CONFIG_FUSE_FS is not set

# ── Disable unused USB class drivers ──
# CONFIG_USB_PRINTER is not set
# CONFIG_USB_STORAGE is not set
# CONFIG_USB_SERIAL is not set

# ── Disable DRM fbdev emulation (pure KMS, no legacy fb) ──
# CONFIG_DRM_FBDEV_EMULATION is not set

# ── Disable unused networking ──
# CONFIG_IPV6 is not set
# CONFIG_NETFILTER is not set
# CONFIG_IP_NF_IPTABLES is not set

# ── Disable kernel debug features ──
# CONFIG_DEBUG_FS is not set
# CONFIG_FTRACE is not set
# CONFIG_KPROBES is not set
# CONFIG_DEBUG_KERNEL is not set

# ── Disable input drivers we don't need ──
# CONFIG_INPUT_JOYSTICK is not set
# CONFIG_INPUT_TABLET is not set
# CONFIG_INPUT_TOUCHSCREEN is not set

# ── Disable wireless (WiFi handled in userspace, keep cfg80211/mac80211) ──
# Note: keep cfg80211 + mac80211 for brcmfmac WiFi driver

# ── Faster boot: printk minimal ──
CONFIG_PRINTK_TIME=n

# ── Compress kernel modules with LZ4 for faster load ──
CONFIG_MODULE_COMPRESS_LZ4=y

# ── Build v3d into the kernel instead of loading as a module ──
# Stock RPi arm64 defconfig builds drm_v3d as a module, and it loads via the
# modprobe@drm chain ~500ms into userspace. Making it built-in means
# /dev/dri/card1 (the Vulkan render node the photon-dashboard Broadcom ICD
# targets) is registered during kernel init, aligned with vc4 at +0.9s.
CONFIG_DRM_V3D=y

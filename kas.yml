header:
  version: 14

machine: raspberrypi-cm5-io-board
distro: poky
target: photon-image

repos:
  poky:
    url: https://git.yoctoproject.org/git/poky
    branch: scarthgap
    path: sources/poky
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-raspberrypi:
    url: https://git.yoctoproject.org/git/meta-raspberrypi
    branch: scarthgap
    path: sources/meta-raspberrypi

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded
    branch: scarthgap
    path: sources/meta-openembedded
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:

  meta-photon:
    path: meta-photon    # local layer, no url

local_conf_header:
  standard: |
    # Machine / Distro
    MACHINE ??= "raspberrypi-cm5-io-board"
    DISTRO ?= "poky"

    # Unlock root account for development natively
    PHOTON_IMAGE_FEATURES = "debug-tweaks"

    # Packaging
    PACKAGE_CLASSES ?= "package_ipk"

    # ── Safe Performance Tuning (Prevent WSL OOM Crashes) ──
    # Capped low to stop 24-core CPUs from spawning 100+ compilers and crashing.
    BB_NUMBER_THREADS = "8"
    PARALLEL_MAKE = "-j 8"

    # PSI-based auto-throttle (scarthgap+): only back off when the system
    # is genuinely under pressure — lets you run hotter without OOM kills.
    # Values are percentages (0-100). Higher = more aggressive.
    BB_PRESSURE_MAX_MEMORY ?= "90"
    BB_PRESSURE_MAX_IO ?= "90"
    BB_PRESSURE_MAX_CPU ?= "100"

    # Remove work dirs after each recipe finishes — saves 40-80 GB of disk
    # I/O and storage.  Disable this if you need to inspect build artifacts.
    INHERIT += "rm_work"
    # Keep work dirs for your own layer so you can debug it easily
    RM_WORK_EXCLUDE += "photon-image"

    # Skip generating mirror tarballs (saves time + disk)
    BB_GENERATE_MIRROR_TARBALLS = "0"

    # Downloads / sstate cache
    DL_DIR ?= "${TOPDIR}/../downloads"
    SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"

    # Vulkan via Mesa v3dv, and required Gallium drivers for Pi 5
    PACKAGECONFIG:append:pn-mesa = " broadcom gallium vulkan egl gbm glx"
    DISTRO_FEATURES:append = " opengl vulkan"

    # X11 stack
    DISTRO_FEATURES:append = " x11"
    PACKAGECONFIG:append:pn-xserver-xorg = " glx"

    # Systemd as init
    DISTRO_FEATURES:append = " systemd usrmerge"
    VIRTUAL-RUNTIME_init_manager = "systemd"
    DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"
    VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

    # Enable V4L2 kernel camera support
    KERNEL_EXTRA_FEATURES:append = " features/media/media.cfg"

    # Accept restricted licenses for Raspberry Pi firmware
    LICENSE_FLAGS_ACCEPTED:append = " synaptics-killswitch"

    # Raspberry Pi GPU memory split (MB allocated to GPU)
    GPU_MEM = "128"

    # CM5 / Pi 5 (BCM2712) needs the -pi5 variant of the vc4 KMS overlay.
    # Without this meta-raspberrypi's rpi-config emits `dtoverlay=vc4-kms-v3d`
    # (the generic/Pi 4 overlay) whose DT nodes do not match the BCM2712 HDMI
    # controller — vc4 never binds, only v3d comes up as card0, Xorg gets
    # "no screens found", and the dashboard boots to a black screen.
    VC4DTBO = "vc4-kms-v3d-pi5"

    # Extra image space (KB) — ~64MB instead of 256MB to shrink image size
    IMAGE_ROOTFS_EXTRA_SPACE = "65536"
    
    # Must be Image.gz on Raspberry Pi 5 / CM5: the BCM2712 firmware
    # bootloader decompresses gzip natively but has NO LZ4 support, so
    # "Image.lz4" produces a boot partition the firmware cannot load from
    # (blank HDMI, kernel never starts, USB HID never comes up). Despite
    # the faster in-kernel decompress of LZ4, gz is the only option here
    # without switching to U-Boot as an intermediate loader.
    KERNEL_IMAGETYPE = "Image.gz"

    # Optimize boot time. cmdline.txt has no 80-char config.txt fragility.
    # Pass-4 adds nokaslr. Still parked for pass 5 bisection:
    #   rcupdate.rcu_expedited=1, rootflags=noatime.
    CMDLINE:append = " quiet loglevel=3 logo.nologo console=tty3 vt.global_cursor_default=0 fsck.mode=skip systemd.show_status=false raid=noautodetect no_console_suspend usbcore.autosuspend=-1 udev.log_level=3 nokaslr"

    # Eliminate Raspberry Pi firmware boot delay (config.txt)
    DISABLE_SPLASH = "1"
    BOOT_DELAY = "0"
    BOOT_DELAY_MS = "0"
    DISABLE_RPI_BOOT_LOGO = "1"

    # Suppress meta-raspberrypi's unsafe single-line append of RPI_EXTRA_CONFIG.
    # The base rpi-config recipe writes RPI_EXTRA_CONFIG to config.txt via one
    # `printf`, producing a line far over the BCM2712 firmware's ~80-char
    # config.txt line limit (see raspberrypi/firmware#1848). Our own rpi-config
    # bbappend in meta-photon reads PHOTON_EXTRA_CONFIG below and writes each
    # directive on its own line, which is always boot-safe.
    RPI_EXTRA_CONFIG = ""

    # Force max CPU clock + disable unused hardware probes. Emitted to config.txt
    # one directive per line by meta-photon/recipes-bsp/bootfiles/rpi-config_%.bbappend.
    #
    # NOTE: restored to exactly the pre-pass-2 directive set after a pass-2 kernel
    # panic. This matches what used to live in RPI_EXTRA_CONFIG as an 80-char-violating
    # single line. If the per-line form of exactly these directives also panics, then
    # the old long-line form was effectively being ignored by the firmware and one of
    # the directives below is actively hostile when actually parsed — revert the
    # bbappend entirely in that case.
    PHOTON_EXTRA_CONFIG = " \
    force_turbo=1 \
    hdmi_force_hotplug=1 \
    usb_max_current_enable=1 \
    camera_auto_detect=0 \
    display_auto_detect=0 \
    dtparam=audio=off \
    disable_poe_fan=1 \
    boot_delay=0 \
    dtparam=act_led_trigger=none \
    dtparam=pwr_led_trigger=none \
    disable_fw_kms_setup=1 \
    auto_initramfs=0 \
    force_eeprom_read=0 \
    disable_overscan=1 \
    disable_commandline_tags=1 \
    dtoverlay=dwc2,dr_mode=peripheral \
    dtparam=spi=on \
    dtoverlay=mcp2515-can0,oscillator=8000000,interrupt=25 \
    "

    # Eliminate U-Boot overhead (Raspberry Pi can boot Linux directly from start.elf) 
    RPI_USE_U_BOOT = "0"
    
    # Strip unnecessary heavy sysinit/multi-user blocks from Systemd
    SYSTEMD_AUTO_ENABLE:pn-systemd-networkd-wait-online = "disable"
    SYSTEMD_AUTO_ENABLE:pn-systemd-timesyncd = "disable"
